---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 8 */3 * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  STORED_DIGEST_PATH: ".base-image-digest"

jobs:
  # Check for base image updates
  check_updates:
    name: Check base image updates
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    outputs:
      amd_intel_updated: ${{ steps.check-amd.outputs.updated }}
      nvidia_updated: ${{ steps.check-nvidia.outputs.updated }}
      amd_intel_digest: ${{ steps.check-amd.outputs.digest }}
      nvidia_digest: ${{ steps.check-nvidia.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get AMD/Intel Base Digest
        id: check-amd
        run: |
          TOKEN=$(curl -sSL "https://ghcr.io/token?service=ghcr.io&scope=repository:ublue-os/bluefin:pull" | jq -r '.token')

          NEW_DIGEST=$(
            curl -sSL \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              -H "Authorization: Bearer $(curl -sSL https://ghcr.io/token?service=ghcr.io&scope=repository:ublue-os/bluefin:pull | jq -r '.token')" \
              https://ghcr.io/v2/ublue-os/bluefin/manifests/stable \
              | jq -r '.config.digest'
          )

          echo "NEW_DIGEST=$NEW_DIGEST"
          echo "digest=$NEW_DIGEST" >> $GITHUB_OUTPUT

          if [[ -f "${STORED_DIGEST_PATH}" ]]; then
            OLD_DIGEST=$(grep "amd_intel:" ${STORED_DIGEST_PATH} | cut -d: -f2)
            if [[ "$NEW_DIGEST" != "$OLD_DIGEST" ]]; then
              echo "updated=true" >> $GITHUB_OUTPUT
            else
              echo "updated=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Get NVIDIA Base Digest
        id: check-nvidia
        run: |
          TOKEN=$(curl -sSL "https://ghcr.io/token?service=ghcr.io&scope=repository:ublue-os/bluefin:pull" | jq -r '.token')

          NEW_DIGEST=$(
            curl -sSL \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              -H "Authorization: Bearer $(curl -sSL https://ghcr.io/token?service=ghcr.io&scope=repository:ublue-os/bluefin-nvidia-open:pull | jq -r '.token')" \
              https://ghcr.io/v2/ublue-os/bluefin-nvidia-open/manifests/stable \
              | jq -r '.config.digest'
          )

          echo "NEW_DIGEST=$NEW_DIGEST"
          echo "digest=$NEW_DIGEST" >> $GITHUB_OUTPUT

          if [[ -f "${STORED_DIGEST_PATH}" ]]; then
            OLD_DIGEST=$(grep "nvidia_open:" ${STORED_DIGEST_PATH} | cut -d: -f2)
            if [[ "$NEW_DIGEST" != "$OLD_DIGEST" ]]; then
              echo "updated=true" >> $GITHUB_OUTPUT
            else
              echo "updated=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Save Digests
        if: success()
        run: |
          echo "amd_intel:${{ steps.check-amd.outputs.digest }}" > ${STORED_DIGEST_PATH}
          echo "nvidia_open:${{ steps.check-nvidia.outputs.digest }}" >> ${STORED_DIGEST_PATH}
          cat ${STORED_DIGEST_PATH}
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add ${STORED_DIGEST_PATH}
          git diff --quiet || git commit -m "chore: update base image digests" && git push

  build_amd_intel:
    name: Build amd-intel image
    runs-on: ubuntu-24.04
    needs: check_updates

    if: needs.check_updates.outputs.amd_intel_updated == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-amd-intel
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      BASE_IMAGE: ghcr.io/ublue-os/bluefin:stable
      IMAGE_ID: kirgo
      VARIANT_ID: kirgo

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 #v4.0.0

      - name: Check Just Syntax
        shell: bash
        run: |
          just check

      - name: Image Name
        id: image-name
        run: |
          IMAGE_NAME="$(just image_name)"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Default Tag
        id: gen-default-tag
        run: |
          DEFAULT_TAG=$(just generate-default-tag)
          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> $GITHUB_ENV

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Build Image
        id: build-image
        run: |
          sudo -E $(command -v just) build \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG}

      - name: Rechunk
        id: rechunk
        run: |
          sudo -E $(command -v just) rechunk \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG}

      - name: Generate Build Tags
        id: gen-build-tags
        run: |
          alias_tags="$(just generate-build-tags \
                        ${IMAGE_NAME} \
                        ${DEFAULT_TAG})"
          echo "Tags for this Action..."
          echo "${alias_tags}"
          echo "alias_tags=${alias_tags}" >> $GITHUB_OUTPUT

      - name: Tag Image
        id: tag-images
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          sudo -E $(command -v just) tag-images \
            "${IMAGE_NAME}" \
            "${DEFAULT_TAG}" \
            "${ALIAS_TAGS}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push-image
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          set -euox pipefail
          for tag in ${ALIAS_TAGS}; do
            sudo -E podman push --digestfile=/tmp/digestfile ${IMAGE_NAME}:${tag} ${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}
          done
          digest=$(< /tmp/digestfile)
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: "v2.6.3"

      - name: Sign container image
        id: sign-image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}

  build_nvidia_open:
    name: Build nvidia-open image
    runs-on: ubuntu-24.04
    needs: check_updates

    if: needs.check_updates.outputs.nvidia_updated == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-nvidia-open
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      BASE_IMAGE: ghcr.io/ublue-os/bluefin-nvidia-open:stable
      IMAGE_ID: kirgo-nvidia-open
      VARIANT_ID: kirgo-nvidia-open

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 #v4.0.0

      - name: Check Just Syntax
        shell: bash
        run: |
          just check

      - name: Image Name
        id: image-name
        run: |
          IMAGE_NAME="$(just image_name)-nvidia-open"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Default Tag
        id: gen-default-tag
        run: |
          DEFAULT_TAG=$(just generate-default-tag)
          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> $GITHUB_ENV

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Build Image
        id: build-image
        run: |
          sudo -E $(command -v just) build \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG}

      - name: Rechunk
        id: rechunk
        run: |
          sudo -E $(command -v just) rechunk \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG}

      - name: Generate Build Tags
        id: gen-build-tags
        run: |
          alias_tags="$(just generate-build-tags \
                        ${IMAGE_NAME} \
                        ${DEFAULT_TAG})"
          echo "Tags for this Action..."
          echo "${alias_tags}"
          echo "alias_tags=${alias_tags}" >> $GITHUB_OUTPUT

      - name: Tag Image
        id: tag-images
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          sudo -E $(command -v just) tag-images \
            "${IMAGE_NAME}" \
            "${DEFAULT_TAG}" \
            "${ALIAS_TAGS}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push-image
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          set -euox pipefail
          for tag in ${ALIAS_TAGS}; do
            sudo -E podman push --digestfile=/tmp/digestfile ${IMAGE_NAME}:${tag} ${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}
          done
          digest=$(< /tmp/digestfile)
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: "v2.6.3"

      - name: Sign container image
        id: sign-image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}
